<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>Habit Tracker</header>
    <main>
      <form id="addHabitForm">
        <input type="text" id="addHabitInput" />
        <button type="submit">Add</button>
      </form>
      <form id="searchHabitForm">
        <input type="text" id="searchHabitInput" />
        <button type="submit">Search</button>
      </form>

      <div id="habitContainer">
        <div id="habitListHeader">
          <h2>Habits</h2>
          <button id="filterBtn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              height="20px"
              viewBox="0 -960 960 960"
              width="20px"
              fill="white"
            >
              <path
                d="M440-160q-17 0-28.5-11.5T400-200v-240L168-736q-15-20-4.5-42t36.5-22h560q26 0 36.5 22t-4.5 42L560-440v240q0 17-11.5 28.5T520-160h-80Zm40-308 198-252H282l198 252Zm0 0Z"
              />
            </svg>
            Filter
          </button>
          <div class="hidden" id="filterCard">
            <p id="filterCardHeader">Status:</p>
            <button id="filterActive" class="filterActive">Active</button>
            <button id="filterCompleted" class="filterCompleted">
              Completed
            </button>
            <button id="resetFilter" class="resetFilter">Reset</button>
          </div>
        </div>
        <div id="habitList"></div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
